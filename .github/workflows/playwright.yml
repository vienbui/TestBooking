name: Playwright Tests
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
jobs:
    critical-tests:
        timeout-minutes: 30
        runs-on: ubuntu-latest
        env:
            CANDIDATE_PATH: /VienBui
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*
            - name: Install dependencies
              run: npm ci
            - name: Install Playwright Browsers
              run: npx playwright install --with-deps
            - name: Run smoke and e2e tests
              run: npx playwright test --grep "@smoke|@e2e"
            - name: Upload critical test results
              uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: allure-results-critical
                  path: allure-results/
                  retention-days: 30

    nonfunctional-tests:
        timeout-minutes: 30
        runs-on: ubuntu-latest
        env:
            CANDIDATE_PATH: /VienBui
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*
            - name: Install dependencies
              run: npm ci
            - name: Install Playwright Browsers
              run: npx playwright install --with-deps
            - name: Run non-functional tests
              run: npx playwright test --grep "@performance|@accessibility|@visual|@security"
              continue-on-error: true
            - name: Upload non-functional test results
              uses: actions/upload-artifact@v4
              if: ${{ !cancelled() }}
              with:
                  name: allure-results-nonfunctional
                  path: allure-results/
                  retention-days: 30

    report:
        if: ${{ !cancelled() }}
        needs: [critical-tests, nonfunctional-tests]
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*
            - name: Install dependencies
              run: npm ci
            - name: Download critical results
              uses: actions/download-artifact@v4
              with:
                  name: allure-results-critical
                  path: allure-results/
              continue-on-error: true
            - name: Download non-functional results
              uses: actions/download-artifact@v4
              with:
                  name: allure-results-nonfunctional
                  path: allure-results/
                  merge-multiple: true
              continue-on-error: true
            - name: Prepare Allure categories
              run: cp categories.json allure-results/
            - name: Load previous Allure history
              uses: actions/cache@v4
              with:
                  path: allure-history
                  key: allure-history-${{ github.ref_name }}
                  restore-keys: |
                      allure-history-main
                      allure-history-
            - name: Restore history into results
              run: |
                  mkdir -p allure-results/history
                  cp -r allure-history/* allure-results/history/ 2>/dev/null || true
            - name: Generate Allure report
              run: npx allure generate allure-results --clean -o allure-report
            - name: Save Allure history for next run
              run: |
                  mkdir -p allure-history
                  cp -r allure-report/history/* allure-history/ 2>/dev/null || true
            - name: Upload Allure report
              uses: actions/upload-artifact@v4
              with:
                  name: allure-report
                  path: allure-report/
                  retention-days: 30
            - name: Comment test results on PR
              if: ${{ github.event_name == 'pull_request' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const critical = '${{ needs.critical-tests.result }}';
                      const nonfunctional = '${{ needs.nonfunctional-tests.result }}';
                      const icon = critical === 'failure' ? '🔴' : nonfunctional === 'failure' ? '⚠️' : '✅';
                      const status = critical === 'failure'
                        ? 'Critical tests FAILED — PR should not be merged'
                        : nonfunctional === 'failure'
                        ? 'Critical tests passed, non-functional tests have issues'
                        : 'All tests passed';

                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body: [
                          `${icon} **Test Results**`,
                          '',
                          status,
                          '',
                          '| Job | Result |',
                          '|-----|--------|',
                          `| Critical (smoke + e2e ) | ${critical} |`,
                          `| Non-functional (performance + security + visual + accessibility) | ${nonfunctional} |`,
                          '',
                          `[View full report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
                        ].join('\n')
                      });
